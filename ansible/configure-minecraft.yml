---
- name: Configure Minecraft server on EC2
  hosts: minecraft
  become: true

  vars:
    aws_region: "us-east-1"
    ecr_repository_name: "ops3-minecraft-lab"
    ecr_image_tag: "mc-java21-v1"
    backup_bucket_name: "ops3-nechypak-minecraft-backups"
    minecraft_dir: "/opt/minecraft"
    minecraft_data_dir: "/opt/minecraft/data"
    minecraft_backup_prefix: "world-backups"
    minecraft_container_name: "minecraft"
    minecraft_version: "1.21.1"
    minecraft_memory: "1G"
    minecraft_motd: "Kanstantsin Nechyparenka nechypak@oregonstate.edu - Ops3"

  tasks:
    - name: Install Docker and AWS CLI prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - unzip
          - tar
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Add Docker GPG key
      ansible.builtin.shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc

    - name: Add Docker apt repository
      ansible.builtin.shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker Engine and Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure Docker is running and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Install AWS CLI v2 bundle when missing
      ansible.builtin.shell: |
        cd /tmp
        curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
        rm -rf /tmp/aws
        unzip -q -o awscliv2.zip
        /tmp/aws/install
      args:
        creates: /usr/local/bin/aws

    - name: Verify AWS identity from instance profile
      ansible.builtin.command: /usr/local/bin/aws sts get-caller-identity
      register: aws_identity
      changed_when: false

    - name: Show AWS identity used by the instance profile
      ansible.builtin.debug:
        var: aws_identity.stdout

    - name: Get AWS account ID
      ansible.builtin.command: /usr/local/bin/aws sts get-caller-identity --query Account --output text
      register: aws_account_id
      changed_when: false

    - name: Set ECR registry and image URI facts
      ansible.builtin.set_fact:
        ecr_registry: "{{ aws_account_id.stdout }}.dkr.ecr.{{ aws_region }}.amazonaws.com"
        minecraft_image_uri: "{{ aws_account_id.stdout }}.dkr.ecr.{{ aws_region }}.amazonaws.com/{{ ecr_repository_name }}:{{ ecr_image_tag }}"

    - name: Authenticate Docker to ECR using instance profile credentials
      ansible.builtin.shell: |
        /usr/local/bin/aws ecr get-login-password --region {{ aws_region }} | \
        docker login --username AWS --password-stdin {{ ecr_registry }}
      changed_when: false

    - name: Create Minecraft directory
      ansible.builtin.file:
        path: "{{ minecraft_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Create Minecraft data directory
      ansible.builtin.file:
        path: "{{ minecraft_data_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Check if Minecraft data already exists
      ansible.builtin.stat:
        path: "{{ minecraft_data_dir }}/world"
      register: minecraft_world

    - name: Check if latest S3 backup exists
      ansible.builtin.command: >
        /usr/local/bin/aws s3 ls
        s3://{{ backup_bucket_name }}/{{ minecraft_backup_prefix }}/latest.tar.gz
      register: s3_latest_backup
      changed_when: false
      failed_when: false

    - name: Download latest world backup from S3
      ansible.builtin.command: >
        /usr/local/bin/aws s3 cp
        s3://{{ backup_bucket_name }}/{{ minecraft_backup_prefix }}/latest.tar.gz
        /tmp/minecraft-restore.tar.gz
      when:
        - not minecraft_world.stat.exists
        - s3_latest_backup.rc == 0

    - name: Restore world data into /opt/minecraft before container start
      ansible.builtin.command: tar -xzf /tmp/minecraft-restore.tar.gz -C "{{ minecraft_dir }}"
      when:
        - not minecraft_world.stat.exists
        - s3_latest_backup.rc == 0

    - name: Write Docker Compose file
      ansible.builtin.copy:
        dest: "{{ minecraft_dir }}/docker-compose.yml"
        owner: root
        group: root
        mode: "0644"
        content: |
          services:
            minecraft:
              image: {{ minecraft_image_uri }}
              container_name: {{ minecraft_container_name }}
              ports:
                - "25565:25565"
              environment:
                EULA: "TRUE"
                VERSION: "{{ minecraft_version }}"
                MEMORY: "{{ minecraft_memory }}"
                MOTD: "{{ minecraft_motd }}"
              volumes:
                - {{ minecraft_data_dir }}:/data
              restart: unless-stopped

    - name: Pull pinned Minecraft image from ECR
      ansible.builtin.command: docker compose pull
      args:
        chdir: "{{ minecraft_dir }}"
      register: compose_pull
      changed_when: "'Downloaded newer image' in compose_pull.stdout or 'Pull complete' in compose_pull.stdout"

    - name: Start Minecraft server container
      ansible.builtin.command: docker compose up -d
      args:
        chdir: "{{ minecraft_dir }}"
      register: compose_up
      changed_when: "'Started' in compose_up.stdout or 'Created' in compose_up.stdout or 'Recreated' in compose_up.stdout"

    - name: Wait for Minecraft startup log
      ansible.builtin.shell: |
        for i in $(seq 1 18); do
          if docker logs {{ minecraft_container_name }} 2>&1 | grep -q "Done"; then
            exit 0
          fi
          sleep 10
        done
        docker logs {{ minecraft_container_name }} 2>&1
        exit 1
      changed_when: false

    - name: Show running Minecraft container
      ansible.builtin.command: docker ps --filter name={{ minecraft_container_name }}
      register: docker_ps
      changed_when: false

    - name: Print running container result
      ansible.builtin.debug:
        var: docker_ps.stdout_lines

    - name: Install backup script
      ansible.builtin.copy:
        dest: /usr/local/bin/minecraft-backup.sh
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/usr/bin/env bash
          set -euo pipefail

          AWS_REGION="{{ aws_region }}"
          BUCKET="{{ backup_bucket_name }}"
          PREFIX="{{ minecraft_backup_prefix }}"
          MINECRAFT_DIR="{{ minecraft_dir }}"
          BACKUP_FILE="/tmp/minecraft-backup-$(date +%Y%m%d-%H%M%S).tar.gz"

          cd "$MINECRAFT_DIR"
          tar -czf "$BACKUP_FILE" data

          /usr/local/bin/aws s3 cp "$BACKUP_FILE" "s3://$BUCKET/$PREFIX/$(basename "$BACKUP_FILE")" --region "$AWS_REGION"
          /usr/local/bin/aws s3 cp "$BACKUP_FILE" "s3://$BUCKET/$PREFIX/latest.tar.gz" --region "$AWS_REGION"

          rm -f "$BACKUP_FILE"

    - name: Schedule Minecraft world backup every 15 minutes
      ansible.builtin.cron:
        name: minecraft world backup
        minute: "*/15"
        user: root
        job: /usr/local/bin/minecraft-backup.sh
        cron_file: minecraft-backup
